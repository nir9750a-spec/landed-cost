<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;}
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  .page{position:relative;width:1080px;height:1350px;overflow:hidden;background:#ffffff;font-family:"FreeSans","DejaVu Sans",sans-serif;}
  .blobA{position:absolute;top:-220px;left:-220px;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle at 60% 60%, #5f6b4e 0%, #4c5741 70%, #4c5741 100%);opacity:0.16;}
  .blobB{position:absolute;bottom:-260px;right:-200px;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle at 40% 40%, #e0863a 0%, #e0863a 70%);opacity:0.14;}
  .topbar{position:absolute;top:0;left:0;width:1080px;height:8px;background:#e0863a;}
  .logo{position:absolute;top:52px;right:56px;background:#12140f;border-radius:20px;padding:16px 26px;display:flex;align-items:center;box-shadow:0 6px 20px rgba(0,0,0,0.18);}
  .logo img{height:58px;display:block;filter:invert(1) brightness(1.9);}
  .headline{position:absolute;top:200px;right:60px;left:150px;text-align:right;color:#1f2420;font-weight:bold;font-size:82px;line-height:1.06;letter-spacing:-1px;}
  .accent{position:absolute;top:406px;right:60px;width:150px;height:9px;border-radius:6px;background:#e0863a;}
  .sub{position:absolute;top:442px;right:60px;left:150px;text-align:right;color:#555b52;font-size:32px;font-weight:bold;}
  .shadow{position:absolute;top:900px;left:120px;width:840px;height:120px;background:radial-gradient(ellipse at center, rgba(20,20,20,0.22) 0%, rgba(20,20,20,0) 70%);}
  .bed{position:absolute;top:600px;left:100px;width:880px;display:block;}
  .price{position:absolute;bottom:150px;right:60px;background:#e0863a;color:#fff;border-radius:26px;padding:16px 36px;text-align:center;box-shadow:0 8px 24px rgba(224,134,58,0.4);}
  .price .num{font-size:66px;font-weight:bold;line-height:1;}
  .price .vat{font-size:26px;font-weight:bold;margin-top:4px;}
  .footer{position:absolute;bottom:0;left:0;width:1080px;height:96px;background:#12140f;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:bold;}
</style></head><body>
<div class="page">
  <div class="blobA"></div><div class="blobB"></div>
  <div class="topbar"></div>
  <div class="logo"><img src="file:///home/user/landed-cost/marketing/ad-sources/4elements-logo.png"></div>
  <div class="headline">הפינוק שמחכה לך<br>בסוף היום.</div>
  <div class="accent"></div>
  <div class="sub">מיטת שדה מתקפלת · ריפוד מוגבר · נפתחת בשנייה · נוחות ביתית</div>
  <div class="shadow"></div>
  <img class="bed" src="file:///home/user/landed-cost/marketing/ad-sources/bed-06B-flat.png">
  <div class="price"><div class="num">₪250</div><div class="vat">כולל מע״מ</div></div>
  <div class="footer">www.4elements.co.il · 052-891-3135</div>
</div>
</body></html>
